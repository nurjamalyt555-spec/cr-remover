<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR-Remover | Copyright Remover</title>
    <style>
        :root {
            --primary-bg: #0b0b0b;
            --card-bg: #151515;
            --accent-blue: #00d2ff;
            --accent-purple: #9d50bb;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-white);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Styles */
        header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-icon { font-size: 30px; cursor: pointer; }

        /* Main Section */
        .hero {
            text-align: center;
            margin-top: 50px;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero h1 span {
            display: block;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-gray);
            font-size: 14px;
            max-width: 400px;
            margin: 20px auto;
            line-height: 1.6;
        }

        /* Upload Card */
        .upload-container {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 40px 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            margin-top: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .drop-zone {
            border: 2px dashed #444;
            border-radius: 15px;
            padding: 40px 20px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .upload-icon { font-size: 40px; margin-bottom: 10px; }

        .drop-zone p { font-size: 14px; color: #888; }
        .drop-zone span { color: var(--accent-blue); font-weight: bold; }

        /* Action Button */
        .btn-remove {
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            border: none;
            border-radius: 30px;
            color: white;
            padding: 15px 0;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }

        .btn-remove:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.5);
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CR-Remover</div>
        <div class="menu-icon">☰</div>
    </header>

    <div class="hero">
        <h1>Copyright Remover <span>Algorithms Instantly</span></h1>
        <p>Copyright Remover - Professional AI deep-clean technology. Upload your video below to simulate advanced content optimization.</p>
    </div>

    <div class="upload-container">
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📤</div>
            <p>Drag video or <span>Browse</span></p>
            <p id="fileName" style="font-size: 12px; margin-top: 10px; color: var(--accent-blue);"></p>
        </div>
        <input type="file" id="fileInput" accept="video/*" onchange="showName()">
        <button class="btn-remove" onclick="startProcess()">Remove Copyright</button>
    </div>

    <script>
        function showName() {
            const input = document.getElementById('fileInput');
            const fileName = document.getElementById('fileName');
            if (input.files.length > 0) {
                fileName.innerText = "Selected: " + input.files.name;
            }
        }

        function startProcess() {
            const input = document.getElementById('fileInput');
            if (input.files.length === 0) {
                alert("Pehle koi video file select karein!");
                return;
            }
            alert("Processing Start... (Ye ek design demo hai, video processing ke liye heavy server chahiye hota hai)");
        }
    </script>

</body>
</html>
