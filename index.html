<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CR Remover</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        h1 { color: #1a73e8; text-align: center; margin-top: 0; font-size: 24px; }
        p { text-align: center; color: #555; margin-bottom: 20px; }
        textarea { width: 100%; height: 180px; border: 2px solid #e0e0e0; border-radius: 10px; padding: 15px; font-size: 16px; box-sizing: border-box; transition: 0.3s; margin-bottom: 15px; }
        textarea:focus { border-color: #1a73e8; outline: none; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; color: white; }
        .btn-clean { background-color: #1a73e8; }
        .btn-clean:hover { background-color: #1557b0; }
        .btn-copy { background-color: #34a853; }
        .btn-copy:hover { background-color: #2d8e47; }
        .btn-clear { background-color: #ea4335; }
        .btn-clear:hover { background-color: #c5221f; }
        label { font-weight: bold; color: #333; display: block; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CR Remover Tool</h1>
        <p>Text paste karke line breaks (Carriage Returns) hatayein.</p>
        
        <label>Input Text:</label>
        <textarea id="inputText" placeholder="Apna text yahan paste karein..."></textarea>
        
        <div class="btn-group">
            <button class="btn-clean" onclick="cleanText()">Remove Line Breaks</button>
            <button class="btn-clear" onclick="clearAll()">Clear</button>
        </div>

        <label>Result:</label>
        <textarea id="outputText" readonly placeholder="Saaf text yahan dikhega..."></textarea>
        
        <button class="btn-copy" onclick="copyText()" style="width: 100%;">Copy to Clipboard</button>
    </div>

    <script>
        function cleanText() {
            let input = document.getElementById('inputText').value;
            // Ye line breaks ko space se badal deta hai
            let output = input.replace(/\r?\n|\r/g, " ");
            document.getElementById('outputText').value = output;
        }

        function copyText() {
            let output = document.getElementById("outputText");
            if (output.value === "") { alert("Pehle text clean karein!"); return; }
            output.select();
            output.setSelectionRange(0, 99999);
            document.execCommand("copy");
            alert("Copy ho gaya!");
        }

        function clearAll() {
            document.getElementById('inputText').value = "";
            document.getElementById('outputText').value = "";
        }
    </script>
</body>
</html>
